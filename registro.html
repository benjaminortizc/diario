<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Motor Digital Chile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .card-registro {
            border: none;
            border-top: 6px solid #e11d2a; /* Rojo Inacap */
            border-radius: 15px;
            max-width: 450px;
            width: 100%;
        }
        .btn-registro {
            background-color: #e11d2a;
            border: none;
            font-weight: bold;
            padding: 10px;
        }
        .btn-registro:hover {
            background-color: #b9151f;
        }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
        }
        .brand-logo {
            font-weight: 900;
            letter-spacing: -1px;
            text-decoration: none;
            color: #1a1a1a;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="card card-registro shadow-lg">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <a href="index.html" class="brand-logo h3">🚗 MOTOR DIGITAL <span class="text-danger">CHILE</span></a>
                <p class="text-muted small">Crea tu cuenta institucional</p>
            </div>

            <form>
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre Completo</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" placeholder="nombre@inacap.cl" required>
                    <div class="form-text" style="font-size: 0.7rem;">Usa tu correo @inacap.cl para beneficios exclusivos.</div>
                </div>

                <div class="mb-3">
                    <label for="pass" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="pass" required>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small text-muted" for="terms">
                        Acepto los términos y condiciones de Motor Digital.
                    </label>
                </div>

                <button type="submit" class="btn btn-danger btn-registro w-100 mb-3 shadow-sm">FINALIZAR REGISTRO</button>
                
                <hr>
                
                <div class="text-center">
                    <p class="small text-muted mb-0">¿Ya tienes una cuenta?</p>
                    <a href="#" class="small fw-bold text-danger text-decoration-none">Inicia sesión aquí</a>
                </div>
            </form>
        </div>
        
        <div class="card-footer bg-light border-0 text-center py-3">
            <a href="index.html" class="text-secondary small text-decoration-none">← Volver a la portada</a>
        </div>
    </div>

</body>
</html>
